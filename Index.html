<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Card</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card{
            background: white;
            width: 300px;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        .profile-img{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit:cover;
            display:block;
            margin: 0 auto 15px;
        }

        h2{
            margin: 10px 0;
        }

        p{
            color: #555;
        }
    </style>

</head>

<body>

<div class="card">

    <img scr="profile.jpg" class="profile-img">

    <h2>Pumudi Ileperuma</h2>

    <h4>BSc Information Systems</h4>

    <p>
        An IT student who enjoys learning technology and improving problem solving skills.
    </p>

</div>

</body>
</html>
